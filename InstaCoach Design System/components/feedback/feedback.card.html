<!-- @dsCard group="Components" viewport="700x380" name="Feedback · Toast & Dialog" subtitle="Calm confirmations and modals" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="../components-demo.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .grid { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
</style>
</head>
<body class="demo">
<div class="grid">
  <div>
    <div class="eyebrow">Toast</div>
    <div class="row">
      <div class="toast">
        <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="var(--ocean-300)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <div><div class="ttl">Session saved</div><div class="msg">Your reflection is in your journal.</div></div>
      </div>
      <div class="toast">
        <svg class="lead" viewBox="0 0 24 24" fill="none" stroke="var(--teal-100)" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>
        <div><div class="ttl">Coach is typing…</div><div class="msg">A new note will appear shortly.</div></div>
      </div>
    </div>
  </div>
  <div>
    <div class="eyebrow">Dialog</div>
    <div class="dialog">
      <h2>End this plan?</h2>
      <p>Your reflections stay in your journal. You can start a new plan any time.</p>
      <div class="actions">
        <button class="btn btn--ghost">Keep going</button>
        <button class="btn btn--danger">End plan</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
