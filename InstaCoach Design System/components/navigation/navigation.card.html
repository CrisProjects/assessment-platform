<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="../components-demo.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px; }
  .grid { display: flex; flex-direction: column; gap: 26px; }
</style>
</head>
<body class="demo">
<div class="grid">
  <div>
    <div class="eyebrow">Underline</div>
    <div class="tabs">
      <span class="tab tab--active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Today</span>

      <span class="tab">Coach</span>
    </div>
  </div>
  <div>
    <div class="eyebrow">Pill</div>
    <div class="tabs tabs--pill">
      <span class="tab">Day</span>
      <span class="tab tab--active">Week</span>
      <span class="tab">Month</span>
    </div>
  </div>
</div>
