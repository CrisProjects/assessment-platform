<!-- @dsCard group="Components" viewport="700x540" name="Forms" subtitle="Buttons, inputs, select, checkbox & switch" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="../components-demo.css" />
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px; }
  .grid { display: flex; flex-direction: column; gap: 22px; }
</style>
</head>
<body class="demo">
<div class="grid">
  <div>
    <div class="eyebrow">Button · variants</div>
    <div class="row">
      <button class="btn btn--primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>Start session</button>
      <button class="btn btn--secondary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg>Reschedule</button>
      <button class="btn btn--ghost">Later</button>
      <button class="btn btn--accent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.94 14.06A2 2 0 0 0 8.5 12.6l-5.6-1.45a.5.5 0 0 1 0-.96L8.5 8.74A2 2 0 0 0 9.94 7.3l1.45-5.6a.5.5 0 0 1 .96 0l1.45 5.6A2 2 0 0 0 15.7 8.74l5.6 1.45a.5.5 0 0 1 0 .96l-5.6 1.45a2 2 0 0 0-1.45 1.45l-1.45 5.6a.5.5 0 0 1-.96 0z"/></svg>Upgrade</button>
      <button class="btn btn--danger">End plan</button>
    </div>
  </div>
  <div>
    <div class="eyebrow">Sizes · states · icon buttons</div>
    <div class="row">
      <button class="btn btn--primary btn--sm">Small</button>
      <button class="btn btn--primary">Medium</button>
      <button class="btn btn--primary btn--lg">Large <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
      <button class="btn btn--primary" disabled>Disabled</button>
      <button class="iconbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.4 2.6a1.4 1.4 0 0 1 3 3l-9 9a2 2 0 0 1-.85.5l-2.87.84a.5.5 0 0 1-.62-.62l.84-2.87a2 2 0 0 1 .5-.85z"/></svg></button>
      <button class="iconbtn iconbtn--outline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
      <button class="iconbtn iconbtn--solid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg></button>
    </div>
  </div>
  <div class="cols-2">
    <div class="field">
      <label for="em">Work email</label>
      <div class="inputwrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input class="input with-icon" id="em" type="email" placeholder="you@company.com" />
      </div>
      <span class="hint">Used only to sign you in.</span>
    </div>
    <div class="field">
      <label for="sl">Session length</label>
      <div class="selectwrap">
        <select class="select" id="sl"><option>15 minutes</option><option>30 minutes</option><option>45 minutes</option></select>
      </div>
    </div>
  </div>
  <div class="cols-2">
    <div class="stack">
      <label class="check on"><span class="box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span><span class="lbl">Email me weekly recaps</span><br/><span class="desc">A short summary every Sunday.</span></span></label>
      <label class="check"><span class="box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span><span class="lbl">Share progress with my coach</span></label>
    </div>
    <div class="stack">
      <span class="switch on"><span class="track"><span class="thumb"></span></span><span class="lbl">Daily nudge</span></span>
      <span class="switch"><span class="track"><span class="thumb"></span></span><span class="lbl">Calendar sync</span></span>
    </div>
  </div>
</div>
</body>
</html>
