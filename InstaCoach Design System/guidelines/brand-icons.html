<!-- @dsCard group="Brand" viewport="700x170" name="Iconography · Lucide" subtitle="Outline, 2px stroke, currentColor — calm & even" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 24px; color: var(--text-body); }
  .row { display: flex; gap: 22px; flex-wrap: wrap; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 64px; }
  .ic i { color: var(--text-strong); }
  .ic.brand i { color: var(--primary); }
  .ic span { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .note { font-size: 12px; color: var(--text-muted); margin-top: 18px; }
</style>
</head>
<body>
  <div class="row">
    <div class="ic brand"><i data-lucide="compass" style="width:26px;height:26px"></i><span>compass</span></div>
    <div class="ic"><i data-lucide="target" style="width:26px;height:26px"></i><span>target</span></div>
    <div class="ic"><i data-lucide="calendar-check" style="width:26px;height:26px"></i><span>calendar</span></div>
    <div class="ic"><i data-lucide="message-circle" style="width:26px;height:26px"></i><span>message</span></div>
    <div class="ic"><i data-lucide="sparkles" style="width:26px;height:26px"></i><span>sparkles</span></div>
    <div class="ic"><i data-lucide="clock" style="width:26px;height:26px"></i><span>clock</span></div>
    <div class="ic"><i data-lucide="notebook-pen" style="width:26px;height:26px"></i><span>journal</span></div>
    <div class="ic"><i data-lucide="arrow-right" style="width:26px;height:26px"></i><span>arrow</span></div>
  </div>
  <div class="note">16 / 20 / 24px · stroke 2px · inherits text color · no filled or multicolor icons</div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
