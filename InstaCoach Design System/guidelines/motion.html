<!-- @dsCard group="Spacing" viewport="700x150" name="Motion" subtitle="Short, soft ease-outs — calm, never bouncy (hover any bar)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; gap: 18px; }
  .cell { flex: 1; }
  .n { font-size: 11px; font-weight: 600; color: var(--text-body); margin-bottom: 8px; }
  .px { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .track { height: 36px; background: var(--surface-sunken); border-radius: var(--radius-pill); padding: 6px; }
  .dot { width: 24px; height: 24px; border-radius: 50%; background: var(--primary); transform: translateX(0); }
  .track:hover .dot { transform: translateX(calc(100% + 100px)); }
  .f { transition: transform var(--dur-fast) var(--ease-out); }
  .b { transition: transform var(--dur-base) var(--ease-out); }
  .s { transition: transform var(--dur-slow) var(--ease-out); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="n">fast <span class="px">120ms</span></div><div class="track"><div class="dot f"></div></div></div>
    <div class="cell"><div class="n">base <span class="px">200ms</span></div><div class="track"><div class="dot b"></div></div></div>
    <div class="cell"><div class="n">slow <span class="px">320ms</span></div><div class="track"><div class="dot s"></div></div></div>
  </div>
  <div class="px" style="margin-top:14px">ease-out · cubic-bezier(0.22, 0.61, 0.36, 1) — no bounce, no spring</div>
</body>
</html>
