<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 28px; display: flex; align-items: center; gap: 44px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .word { font-family: var(--font-serif); font-weight: 500; font-size: 40px; letter-spacing: -0.02em; color: var(--text-strong); }
  img.mark { width: 56px; height: 56px; display: block; }
  .caption { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); margin-top: 12px; }
  .stack { display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div class="stack">
    <div class="lockup">
      <img class="mark" src="../assets/logo/instacoach-mark.svg" alt="InstaCoach mark" />
      <span class="word">InstaCoach</span>
    </div>
    <div class="caption">primary lockup · clear space = mark height</div>
  </div>
  <div class="stack">
    <img class="mark" src="../assets/logo/instacoach-mark.svg" alt="InstaCoach mark" style="width:72px;height:72px" />
    <div class="caption">app icon / favicon</div>
  </div>
</body>
</html>
