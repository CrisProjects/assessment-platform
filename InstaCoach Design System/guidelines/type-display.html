<!-- @dsCard group="Type" viewport="700x230" name="Display · Newsreader" subtitle="Serif headlines — editorial, literary, calm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 24px; color: var(--text-strong); }
  .display { font: var(--font-display); letter-spacing: var(--tracking-display); margin: 0 0 6px; }
  .h1 { font: var(--font-h1); letter-spacing: var(--tracking-display); margin: 0 0 4px; }
  .h2 { font: var(--font-h2); letter-spacing: var(--tracking-heading); margin: 0 0 4px; }
  .meta { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .ital { font-family: var(--font-serif); font-style: italic; font-size: 20px; color: var(--primary); }
</style>
</head>
<body>
  <div class="display">Here's your next move.</div>
  <div class="meta">display · 56 / 1.02 · medium · tracking −0.02em</div>
  <div style="height:14px"></div>
  <div class="h1">Begin where you are</div>
  <div class="meta">h1 · 40 · medium</div>
  <div style="height:10px"></div>
  <div class="h2">Grow with intention</div>
  <div class="meta">h2 · 32 · medium</div>
  <div style="height:12px"></div>
  <div class="ital">"Coaching that meets you mid-week."</div>
  <div class="meta">italic · pull-quote / tagline</div>
</body>
</html>
