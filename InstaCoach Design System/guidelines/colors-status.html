<!-- @dsCard group="Colors" viewport="700x170" name="Status" subtitle="Low-chroma, calm — clay for danger, never fire-red" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .pair { display: flex; flex-direction: column; gap: 8px; }
  .solid { height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; padding: 0 12px; color: #fff; font-size: 12px; font-weight: 700; }
  .soft { height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; padding: 0 12px; font-size: 11px; font-weight: 600; }
  .h { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="pair">
      <div class="solid" style="background:var(--success)">Success</div>
      <div class="soft" style="background:var(--success-soft); color:var(--success)">On track</div>
      <div class="h">#2F7D5B</div>
    </div>
    <div class="pair">
      <div class="solid" style="background:var(--warning)">Warning</div>
      <div class="soft" style="background:var(--warning-soft); color:var(--warning)">Due soon</div>
      <div class="h">#B5832C</div>
    </div>
    <div class="pair">
      <div class="solid" style="background:var(--danger)">Danger</div>
      <div class="soft" style="background:var(--danger-soft); color:var(--danger)">Overdue</div>
      <div class="h">#B5503C</div>
    </div>
    <div class="pair">
      <div class="solid" style="background:var(--info)">Info</div>
      <div class="soft" style="background:var(--info-soft); color:var(--info)">Note</div>
      <div class="h">#357C7A</div>
    </div>
  </div>
</body>
</html>
