<!-- @dsCard group="Brand" viewport="700x230" name="Voice & tone" subtitle="Smart & concise — the next move, plainly stated" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 24px; color: var(--text-body); }
  .tag { font-family: var(--font-serif); font-style: italic; font-size: 26px; color: var(--primary); margin: 0 0 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px; }
  .h { font: var(--font-label); letter-spacing: var(--tracking-label); text-transform: uppercase; margin-bottom: 6px; }
  .do .h { color: var(--success); }
  .dont .h { color: var(--danger); }
  .line { font-size: 14px; line-height: 1.5; margin: 2px 0; }
  .do .line::before { content: "✓ "; color: var(--success); font-weight: 700; }
  .dont .line::before { content: "✕ "; color: var(--danger); font-weight: 700; }
  .dont .line { color: var(--text-muted); }
</style>
</head>
<body>
  <p class="tag">"Here's your next move."</p>
  <div class="grid">
    <div class="do">
      <div class="h">We say</div>
      <div class="line">Reframe one hard conversation.</div>
      <div class="line">On track.</div>
      <div class="line">Nothing due today. A good time to reflect.</div>
    </div>
    <div class="dont">
      <div class="h">We don't</div>
      <div class="line">You might want to consider reframing…</div>
      <div class="line">Amazing job!! 🎉 You're crushing it!</div>
      <div class="line">You missed your task again.</div>
    </div>
  </div>
  <p class="line" style="margin-top:16px; color:var(--text-muted); font-size:13px">Sentence case · second person · no emoji · calm under pressure</p>
</body>
</html>
