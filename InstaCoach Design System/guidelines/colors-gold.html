<!-- @dsCard group="Colors" viewport="700x150" name="Accent · Gold" subtitle="Warm gold — used sparingly, like a highlighter" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); position: relative; }
  .n { font-size: 11px; font-weight: 600; color: var(--text-body); }
  .h { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .star { position: absolute; top: 6px; right: 6px; color: var(--ocean-700); font-size: 13px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><div class="n">700</div><div class="h">#8A6526</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><div class="n">600 · hover</div><div class="h">#A87C36</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"><span class="star">★</span></div><div class="n">500 · accent</div><div class="h">#C49A52</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><div class="n">400</div><div class="h">#D2AE6E</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-300)"></div><div class="n">300</div><div class="h">#E0C691</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-100)"></div><div class="n">100 · soft</div><div class="h">#F2E7CC</div></div>
  </div>
</body>
</html>
