<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="9 steps — serif for display/headings, sans below" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 22px; color: var(--text-strong); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .r:last-child { border-bottom: none; }
  .tok { width: 150px; flex: none; font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .sample { color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .serif { font-family: var(--font-serif); font-weight: 500; }
  .sans { font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="r"><div class="tok">display · 56</div><div class="sample serif" style="font-size:38px">Next move</div></div>
  <div class="r"><div class="tok">h1 · 40</div><div class="sample serif" style="font-size:30px">Next move</div></div>
  <div class="r"><div class="tok">h2 · 32</div><div class="sample serif" style="font-size:25px">Next move</div></div>
  <div class="r"><div class="tok">h3 · 24</div><div class="sample sans" style="font-size:22px;font-weight:600">Next move</div></div>
  <div class="r"><div class="tok">h4 · 19</div><div class="sample sans" style="font-size:19px;font-weight:600">Next move</div></div>
  <div class="r"><div class="tok">body-lg · 17</div><div class="sample sans" style="font-size:17px">Your next move, every day</div></div>
  <div class="r"><div class="tok">body · 15</div><div class="sample sans" style="font-size:15px">Your next move, every day</div></div>
  <div class="r"><div class="tok">sm · 13</div><div class="sample sans" style="font-size:13px;color:var(--text-muted)">Your next move, every day</div></div>
  <div class="r"><div class="tok">xs · 11</div><div class="sample sans" style="font-size:11px;color:var(--text-muted)">YOUR NEXT MOVE</div></div>
</body>
</html>
