<!-- @dsCard group="Spacing" viewport="700x210" name="Spacing scale" subtitle="4px base grid — layouts breathe" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 22px; }
  .r { display: flex; align-items: center; gap: 14px; padding: 3px 0; }
  .tok { width: 92px; flex: none; font-size: 11px; font-weight: 600; color: var(--text-body); }
  .px { width: 46px; flex: none; font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .bar { height: 14px; background: var(--ocean-300); border-radius: 3px; }
</style>
</head>
<body>
  <div class="r"><div class="tok">space-1</div><div class="px">4</div><div class="bar" style="width:4px"></div></div>
  <div class="r"><div class="tok">space-2</div><div class="px">8</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="tok">space-3</div><div class="px">12</div><div class="bar" style="width:12px"></div></div>
  <div class="r"><div class="tok">space-4</div><div class="px">16</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="tok">space-6</div><div class="px">24</div><div class="bar" style="width:24px"></div></div>
  <div class="r"><div class="tok">space-8</div><div class="px">32</div><div class="bar" style="width:32px"></div></div>
  <div class="r"><div class="tok">space-12</div><div class="px">48</div><div class="bar" style="width:48px"></div></div>
  <div class="r"><div class="tok">space-16</div><div class="px">64</div><div class="bar" style="width:64px"></div></div>
  <div class="r"><div class="tok">space-24</div><div class="px">96</div><div class="bar" style="width:96px"></div></div>
</body>
</html>
