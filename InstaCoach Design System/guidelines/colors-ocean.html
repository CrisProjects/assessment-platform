<!-- @dsCard group="Colors" viewport="700x150" name="Brand · Ocean" subtitle="The core blue scale — primary is ocean-600" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .n { font-size: 11px; font-weight: 600; color: var(--text-body); }
  .h { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .star { position: absolute; top: 6px; right: 6px; color: var(--accent); font-size: 13px; }
  .chip-wrap { position: relative; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ocean-900)"></div><div class="n">900</div><div class="h">#14233F</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-800)"></div><div class="n">800</div><div class="h">#1A2E54</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-700)"></div><div class="n">700</div><div class="h">#213C70</div></div>
    <div class="sw"><div class="chip-wrap"><div class="chip" style="background:var(--ocean-600)"></div><span class="star">★</span></div><div class="n">600 · primary</div><div class="h">#2C5AA8</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-500)"></div><div class="n">500</div><div class="h">#3A6CC4</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-400)"></div><div class="n">400</div><div class="h">#5E8AD6</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-300)"></div><div class="n">300</div><div class="h">#93B2E6</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-200)"></div><div class="n">200</div><div class="h">#BFD3F0</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-100)"></div><div class="n">100 · sky</div><div class="h">#DCE7F8</div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean-50)"></div><div class="n">50</div><div class="h">#EEF3FC</div></div>
  </div>
</body>
</html>
