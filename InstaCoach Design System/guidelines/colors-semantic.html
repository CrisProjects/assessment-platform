<!-- @dsCard group="Colors" viewport="700x180" name="Semantic roles" subtitle="Text, surface & border aliases — consume these in UI" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 20px; display: flex; gap: 18px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .lbl { font: var(--font-label); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
  .txt { font-size: 14px; font-weight: 500; }
  .tok { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
  .surf { height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; padding: 0 10px; font-size: 11px; font-weight: 600; border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
  <div class="col">
    <div class="lbl">Text</div>
    <div class="txt" style="color:var(--text-strong)">Strong <span class="tok">--text-strong</span></div>
    <div class="txt" style="color:var(--text-body)">Body <span class="tok">--text-body</span></div>
    <div class="txt" style="color:var(--text-muted)">Muted <span class="tok">--text-muted</span></div>
    <div class="txt" style="color:var(--text-subtle)">Subtle <span class="tok">--text-subtle</span></div>
    <div class="txt" style="color:var(--text-link)">Link <span class="tok">--text-link</span></div>
  </div>
  <div class="col">
    <div class="lbl">Surface</div>
    <div class="surf" style="background:var(--surface-page)">Page</div>
    <div class="surf" style="background:var(--surface-card)">Card</div>
    <div class="surf" style="background:var(--surface-sunken)">Sunken</div>
    <div class="surf" style="background:var(--surface-hover)">Hover</div>
    <div class="surf" style="background:var(--surface-inverse); color:var(--text-inverse); border:none">Inverse</div>
  </div>
  <div class="col">
    <div class="lbl">Border</div>
    <div class="surf" style="border-color:var(--border-subtle); border-width:2px">Subtle</div>
    <div class="surf" style="border-color:var(--border-default); border-width:2px">Default</div>
    <div class="surf" style="border-color:var(--border-strong); border-width:2px">Strong</div>
    <div class="surf" style="border-color:var(--border-brand); border-width:2px">Brand</div>
  </div>
</body>
</html>
