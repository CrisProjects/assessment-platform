<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals · Mist" subtitle="Cool, slightly blue-tinted grays — serene, never warm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.07); }
  .n { font-size: 11px; font-weight: 600; color: var(--text-body); }
  .h { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--mist-900)"></div><div class="n">900</div><div class="h">#1B2029</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-800)"></div><div class="n">800 · body</div><div class="h">#313842</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-700)"></div><div class="n">700</div><div class="h">#474F5C</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-600)"></div><div class="n">600 · muted</div><div class="h">#646E7E</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-500)"></div><div class="n">500</div><div class="h">#8C97A8</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-400)"></div><div class="n">400</div><div class="h">#B7C1D0</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-300)"></div><div class="n">300</div><div class="h">#D5DCE7</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-200)"></div><div class="n">200</div><div class="h">#E6EBF2</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-100)"></div><div class="n">100 · page</div><div class="h">#F1F4F9</div></div>
    <div class="sw"><div class="chip" style="background:var(--mist-50)"></div><div class="n">50</div><div class="h">#FAFBFD</div></div>
  </div>
</body>
</html>
