<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, diffuse, forest-tinted — shadows whisper" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 28px 22px; }
  .row { display: flex; gap: 22px; }
  .sw { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .n { font-size: 11px; font-weight: 600; color: var(--text-body); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm · cards</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md · raised</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg · float</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="n">xl · modal</div></div>
  </div>
</body>
</html>
