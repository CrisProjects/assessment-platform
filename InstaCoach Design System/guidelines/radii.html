<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Soft, rounded corners — md for buttons, lg for cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); padding: 22px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 72px; height: 56px; background: var(--ocean-100); border: 1.5px solid var(--ocean-300); border-bottom: none; }
  .n { font-size: 11px; font-weight: 600; color: var(--text-body); }
  .px { font-size: 10px; font-family: var(--font-mono); color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:var(--radius-xs) var(--radius-xs) 0 0"></div><div class="n">xs</div><div class="px">6</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-sm) var(--radius-sm) 0 0"></div><div class="n">sm</div><div class="px">8</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-md) var(--radius-md) 0 0"></div><div class="n">md</div><div class="px">10</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-lg) var(--radius-lg) 0 0"></div><div class="n">lg</div><div class="px">14</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-xl) var(--radius-xl) 0 0"></div><div class="n">xl</div><div class="px">18</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-2xl) var(--radius-2xl) 0 0"></div><div class="n">2xl</div><div class="px">24</div></div>
    <div class="sw"><div class="box" style="border-radius:var(--radius-pill) var(--radius-pill) 0 0"></div><div class="n">pill</div><div class="px">999</div></div>
  </div>
</body>
</html>
